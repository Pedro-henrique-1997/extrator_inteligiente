services:

  api:
    build: .
    container_name: extrator-api

    ports:
      - "8000:8000"

    environment:
      DB_HOST: host.docker.internal
      DB_USER: root
      DB_PASSWORD:
      DB_NAME: extrator_db

  frontend:
    build: ./frontend-react
    container_name: extrator-react

    ports:
      - "5173:5173"

    depends_on:
      - api